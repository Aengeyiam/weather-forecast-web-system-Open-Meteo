<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个性化天气预报与生活建议系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="redirect-page">
        <div class="redirect-card">
            <div class="login-icon">🌤️</div>
            <h1 class="login-title">个性化天气系统</h1>
            <p class="login-subtitle">正在检测登录状态，请稍候...</p>
            <div class="loading-indicator"><span class="spinner"></span> 页面跳转中</div>
            <p class="redirect-links">
                如果没有自动跳转，请打开 <a href="login.html">登录页</a> 或 <a href="main.html">主页</a>。
            </p>
        </div>
    </div>
    <script>
        fetch('api/session.php', { method: 'GET' })
            .then(function (res) { return res.json(); })
            .then(function (data) {
                if (data && data.success && data.logged_in) {
                    window.location.replace('main.html');
                } else {
                    window.location.replace('login.html');
                }
            })
            .catch(function () {
                window.location.replace('login.html');
            });
    </script>
</body>
</html>
