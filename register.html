<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册 - 天气预报系统</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .form-input.confirm-password {
            padding-left: 40px;
        }
        .register-success {
            padding: var(--spacing-md);
            background: #E8F5E9;
            color: var(--color-success);
            border-radius: var(--radius-sm);
            font-size: 13px;
            border-left: 3px solid var(--color-success);
            text-align: center;
        }
        .login-link {
            margin-top: var(--spacing-lg);
            text-align: center;
            font-size: 13px;
            color: var(--color-text-light);
        }
        .login-link a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 600;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">📝</div>
                <h1 class="login-title">用户注册</h1>
                <p class="login-subtitle">创建账号以使用天气预报系统</p>
            </div>

            <form id="registerForm" class="login-form" autocomplete="off">
                <div class="form-group">
                    <label for="regUsername" class="form-label">用户名</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input
                            type="text"
                            id="regUsername"
                            class="form-input"
                            placeholder="2-50个字符"
                            autocomplete="off"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="regPassword" class="form-label">密码</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input
                            type="password"
                            id="regPassword"
                            class="form-input"
                            placeholder="至少6位密码"
                            autocomplete="new-password"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="regPasswordConfirm" class="form-label">确认密码</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input
                            type="password"
                            id="regPasswordConfirm"
                            class="form-input confirm-password"
                            placeholder="请再次输入密码"
                            autocomplete="new-password"
                        >
                    </div>
                </div>

                <div id="regError" class="error-message hidden"></div>
                <div id="regSuccess" class="register-success hidden"></div>

                <button type="submit" id="regBtn" class="btn btn-primary btn-block">
                    <span class="btn-text">注 册</span>
                    <span class="btn-loading hidden">注册中...</span>
                </button>
            </form>

            <div class="login-link">
                已有账号？<a href="index.html">返回登录</a>
            </div>
        </div>
    </div>

    <script>
        (function () {
            var form = document.getElementById('registerForm');
            var errorEl = document.getElementById('regError');
            var successEl = document.getElementById('regSuccess');
            var btn = document.getElementById('regBtn');
            var API = 'api/register.php';

            function showError(msg) {
                errorEl.textContent = msg;
                errorEl.classList.remove('hidden');
                successEl.classList.add('hidden');
            }

            function hideError() {
                errorEl.classList.add('hidden');
            }

            function showSuccess(msg) {
                successEl.textContent = msg;
                successEl.classList.remove('hidden');
                errorEl.classList.add('hidden');
            }

            function setLoading(loading) {
                var textEl = btn.querySelector('.btn-text');
                var loadingEl = btn.querySelector('.btn-loading');
                if (loading) {
                    btn.disabled = true;
                    textEl.classList.add('hidden');
                    loadingEl.classList.remove('hidden');
                } else {
                    btn.disabled = false;
                    textEl.classList.remove('hidden');
                    loadingEl.classList.add('hidden');
                }
            }

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                hideError();

                var username = document.getElementById('regUsername').value.trim();
                var password = document.getElementById('regPassword').value;
                var confirm = document.getElementById('regPasswordConfirm').value;

                if (!username || !password || !confirm) {
                    showError('请填写所有字段');
                    return;
                }

                if (username.length < 2 || username.length > 50) {
                    showError('用户名长度需在2-50个字符之间');
                    return;
                }

                if (password.length < 6) {
                    showError('密码长度不能少于6位');
                    return;
                }

                if (password !== confirm) {
                    showError('两次输入的密码不一致');
                    return;
                }

                setLoading(true);

                fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, password: password })
                })
                .then(function (res) { return res.json(); })
                .then(function (data) {
                    setLoading(false);
                    if (data.success) {
                        showSuccess('注册成功！即将跳转到登录页...');
                        form.reset();
                        setTimeout(function () {
                            window.location.href = 'index.html';
                        }, 1500);
                    } else {
                        showError(data.message || '注册失败，请重试');
                    }
                })
                .catch(function () {
                    setLoading(false);
                    showError('网络异常，请稍后重试');
                });
            });
        })();
    </script>
</body>
</html>
